<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Heart</title>

<style>
body {
    margin: 0;
    background: black;
    overflow: hidden;
    font-family: Arial;
}


.star {
    position: absolute;
    width: 2px;
    height: 2px;
    background: #ff69b4;
    border-radius: 50%;
    opacity: 0.8;
    animation: twinkle 2s infinite ease-in-out;
}

@keyframes twinkle {
    0%,100% { opacity: 0.2; }
    50% { opacity: 1; }
}


.word {
    position: absolute;
    font-size: 14px;
    color: #ff69b4;
    font-weight: 500;
    white-space: nowrap;
    opacity: 0.9;
}

.centerText {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 48px;
    color: #ff1493;
    font-weight: bold;
    text-shadow: 0 0 15px #ff69b4;
}
</style>

</head>
<body>

<div class="centerText">رنا</div>

<script>


for (let i = 0; i < 120; i++) {
    let star = document.createElement("div");
    star.className = "star";

    star.style.left = Math.random() * window.innerWidth + "px";
    star.style.top = Math.random() * window.innerHeight + "px";

    star.style.animationDelay = (Math.random() * 2) + "s";

    document.body.appendChild(star);
}

const words = [];
const text = "𝑰 𝒍𝒐𝒗𝒆 𝒚𝒐𝒖";


function heart(t) {
    let x = 16 * Math.pow(Math.sin(t), 3);
    let y = 13 * Math.cos(t) - 5 * Math.cos(2*t)
          - 2 * Math.cos(3*t) - Math.cos(4*t);
    return {x, y};
}

let points = 180;

for (let i = 0; i < points; i++) {

    let t = (i / points) * Math.PI * 2;
    let pos = heart(t);

    let el = document.createElement("div");
    el.className = "word";
    el.innerText = text;

    document.body.appendChild(el);

    words.push({
        el: el,
        baseX: pos.x,
        baseY: pos.y
    });
}


function animate(time) {

    let scale = 13 + Math.sin(time * 0.002) * 1.5;

    words.forEach(w => {
        let x = w.baseX * scale + window.innerWidth / 2;
        let y = -w.baseY * scale + window.innerHeight / 2;

        w.el.style.left = x + "px";
        w.el.style.top = y + "px";
    });

    requestAnimationFrame(animate);
}

animate(0);
</script>

</body>
</html>
