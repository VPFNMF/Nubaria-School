<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>
*{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

:root{
  --g: #34D399;
  --g2: #10B981;
  --g3: #6EE7B7;
  --dark: #050e09;
}

html,body{ height:100%; overflow-x:hidden; background:#050e09; }

body{
  min-height:100vh;
  font-family:'Segoe UI',Arial,sans-serif;
  position:relative;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

/* BG image with dark overlay */
.bg{
  position:fixed; inset:0; z-index:0;
  background: url("https://i.ibb.co/8DznhvfR/photo.jpg") center/cover no-repeat;
}
.bg::after{
  content:""; position:absolute; inset:0;
  background: linear-gradient(180deg,
    rgba(5,14,9,.90) 0%,
    rgba(5,14,9,.80) 40%,
    rgba(5,14,9,.95) 100%
  );
}

/* floating particles canvas */
#particles{ position:fixed; inset:0; z-index:1; pointer-events:none; }

/* aurora glow blobs */
.aurora{
  position:fixed; z-index:1; pointer-events:none;
  border-radius:50%; filter:blur(80px); opacity:.18;
}
.aurora-1{
  width:300px; height:300px;
  background: radial-gradient(circle, #34D399, transparent 70%);
  top:-50px; left:-50px;
  animation: float1 8s ease-in-out infinite;
}
.aurora-2{
  width:250px; height:250px;
  background: radial-gradient(circle, #059669, transparent 70%);
  bottom:-50px; right:-50px;
  animation: float2 10s ease-in-out infinite;
}
@keyframes float1{
  0%,100%{ transform:translate(0,0); }
  50%{ transform:translate(40px,20px); }
}
@keyframes float2{
  0%,100%{ transform:translate(0,0); }
  50%{ transform:translate(-30px,-20px); }
}

/* ═══════════════════════════════
   PAGE: PROFILE
═══════════════════════════════ */
#page-profile{
  position:relative; z-index:2;
  display:flex;
  flex-direction:column; align-items:center;
  padding: 5vh 20px 20px;
  width: 100%;
  max-width: 450px;
  margin: 0 auto;
  opacity:0;
  transform:translateY(10px);
  animation: initProfile 0.4s cubic-bezier(.25, 1, .5, 1) forwards;
}

@keyframes initProfile {
  to { opacity:1; transform:translateY(0); }
}

/* avatar */
.av-wrap{
  position:relative;
  width: min(50vw, 170px);
  height: min(50vw, 170px);
  margin-bottom: 20px;
}

/* outer orbit ring */
.orbit{
  position:absolute; inset:-16px;
  border-radius:50%;
  animation: spin 6s linear infinite;
}
.orbit-dot{
  position:absolute; top:2px; left:50%; transform:translateX(-50%);
  width:6px; height:6px; border-radius:50%;
  background: var(--g);
  box-shadow: 0 0 10px var(--g), 0 0 20px var(--g);
}
.orbit-dot2{
  position:absolute; bottom:2px; left:50%; transform:translateX(-50%);
  width:4px; height:4px; border-radius:50%;
  background: var(--g3); opacity:.6;
}
.orbit-ring{
  position:absolute; inset:0;
  border-radius:50%;
  border:1px solid rgba(52,211,153,.15);
}

@keyframes spin{ to{ transform:rotate(360deg); } }

/* spinning arc */
.arc{
  position:absolute; inset:-9px;
  border-radius:50%;
  border:2px solid transparent;
  border-top-color: var(--g);
  border-right-color: rgba(52,211,153,.3);
  animation: spin 2.5s linear infinite;
}
.arc2{
  position:absolute; inset:-13px;
  border-radius:50%;
  border:1px solid transparent;
  border-bottom-color: var(--g2);
  border-left-color: rgba(16,185,129,.2);
  animation: spin 4s linear infinite reverse;
}

.av-img{
  width:100%; height:100%;
  border-radius:50%;
  object-fit:cover;
  border:3px solid rgba(52,211,153,.3);
  position:relative; z-index:1;
  animation: popIn .5s cubic-bezier(.34,1.56,.64,1) .05s both;
  opacity:0; transform:scale(.4);
}
@keyframes popIn{ to{ opacity:1; transform:scale(1); } }

/* live pulse ring */
.live-ring{
  position:absolute; inset:0; border-radius:50%; z-index:0;
  animation: liveRing 2s ease-in-out infinite;
}
@keyframes liveRing{
  0%,100%{ box-shadow:0 0 0 0 rgba(52,211,153,.4); }
  50%{ box-shadow:0 0 0 10px rgba(52,211,153,0); }
}

/* LIVE badge */
.live-badge{
  position:absolute; bottom:-2px; left:50%; transform:translateX(-50%);
  display:flex; align-items:center; gap:5px;
  background:#ef4444; color:#fff;
  font-size:9px; font-weight:800; letter-spacing:1.5px;
  padding:3px 10px; border-radius:20px; z-index:2;
  box-shadow:0 0 12px rgba(239,68,68,.4);
  animation: fadeUp .4s ease .2s both;
}
.live-dot{ width:6px; height:6px; border-radius:50%; background:#fff; animation:blink 1s ease-in-out infinite; }
@keyframes blink{ 0%,100%{opacity:1} 50%{opacity:.15} }

/* name */
.profile-name{
  font-size:clamp(26px,7.5vw,34px);
  font-weight:900; color:#fff;
  letter-spacing:4px; text-transform:uppercase;
  text-shadow:0 0 40px rgba(52,211,153,.35);
  animation: fadeUp .4s ease .1s both;
  opacity:0;
}
.profile-tag{
  font-size:clamp(11px,2.5vw,13px);
  color:var(--g); letter-spacing:2.5px;
  text-transform:uppercase; margin-top:5px;
  animation: fadeUp .4s ease .15s both;
  opacity:0;
  text-align: center;
}

/* divider */
.divider{
  display:flex; align-items:center; gap:12px;
  margin:12px 0;
  width: 100%;
  justify-content: center;
  animation: fadeUp .4s ease .2s both;
  opacity:0;
}
.divider-line{ width:45px; height:1px; background:rgba(52,211,153,.25); }
.divider-icon{ color:var(--g); font-size:11px; }

/* stats */
.stats{
  display:flex; width:100%;
  background:rgba(255,255,255,.02);
  border:1px solid rgba(255,255,255,.05);
  border-radius:14px; overflow:hidden;
  animation: fadeUp .4s ease .25s both;
  opacity:0;
}
.stat{
  padding:10px 8px; text-align:center; flex:1;
}
.stat+.stat{ border-left:1px solid rgba(255,255,255,.05); }
.stat-n{ font-size:13px; font-weight:700; color:#fff; }
.stat-l{ font-size:9px; color:rgba(255,255,255,.4); letter-spacing:1px; text-transform:uppercase; margin-top:2px; }

/* enter btn */
.enter-btn{
  margin-top:20px;
  padding:12px 40px;
  border-radius:50px;
  border:1.5px solid var(--g);
  background:rgba(52,211,153,.12);
  color:#fff;
  font-size:clamp(14px,3.8vw,15px);
  font-weight:700; letter-spacing:3px;
  cursor:pointer; overflow:hidden; position:relative;
  animation: fadeUp .4s ease .3s both, btnGlow 2s infinite ease-in-out;
  opacity:0;
  transition:.2s cubic-bezier(.25, 1, .5, 1);
}
@keyframes btnGlow {
  0%, 100% { box-shadow: 0 0 8px rgba(52,211,153,0.2), inset 0 0 4px rgba(52,211,153,0.1); border-color: rgba(52,211,153,0.5); }
  50% { box-shadow: 0 0 22px rgba(52,211,153,0.6), inset 0 0 10px rgba(52,211,153,0.3); border-color: var(--g); }
}
.enter-btn::after{
  content:"";
  position:absolute; inset:0;
  background: radial-gradient(ellipse at 50% 110%, rgba(52,211,153,.35), transparent 70%);
  opacity:0; transition:.3s;
}
.enter-btn:hover::after, .enter-btn:active::after{ opacity:1; }
.enter-btn:active { transform:scale(.95); }

@keyframes fadeUp{
  from{ opacity:0; transform:translateY(12px); }
  to{ opacity:1; transform:translateY(0); }
}


/* ═══════════════════════════════
   PAGE: LINKS
═══════════════════════════════ */
#page-links{
  position:relative; z-index:2;
  display:none; flex-direction:column; align-items:center;
  padding: 3vh 16px 30px;
  width: 100%;
  max-width: 420px;
  margin: 0 auto;
}

/* back button */
.back-btn{
  align-self:flex-start;
  display:flex; align-items:center; gap:6px;
  color:rgba(255,255,255,.5);
  font-size:13px; letter-spacing:1px;
  background:none; border:none; cursor:pointer;
  padding:6px 0; margin-bottom:10px;
  transition:.2s;
}
.back-btn:hover{ color:var(--g); }
.back-btn i{ font-size:13px; }

/* mini avatar */
.mini-av{
  display:flex; flex-direction:column; align-items:center;
  margin-bottom:18px;
  width: 100%;
}
.mini-av img{
  width: min(32vw, 130px);
  height: min(32vw, 130px);
  border-radius:50%;
  object-fit:cover;
  border:3px solid rgba(52,211,153,.4);
  box-shadow:0 0 25px rgba(52,211,153,.2);
}
.mini-av-name{
  font-size:18px; font-weight:800; color:#fff;
  letter-spacing:2px; margin-top:8px;
}
.mini-av-tag{
  font-size:11px; color:var(--g);
  letter-spacing:1.5px; margin-top:2px;
}

/* section label */
.section-lbl{
  font-size:9px; letter-spacing:3px;
  color:rgba(255,255,255,.25);
  text-transform:uppercase;
  margin-bottom:12px;
}

/* link buttons */
.link-btn{
  display:flex; align-items:center;
  width:100%;
  margin:7px 0;
  padding:12px 14px;
  border-radius:16px;
  text-decoration:none; color:#fff;
  font-size:14.5px;
  font-weight:700;
  background:rgba(255,255,255,.02);
  border:1px solid rgba(255,255,255,.05);
  position:relative; overflow:hidden;
  opacity:0;
  transition: background .25s, border-color .25s, box-shadow .25s, transform .15s;
  cursor:pointer;
}
.link-icon{
  width:36px; height:36px; border-radius:12px;
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0; margin-right:12px; font-size:15px;
  transition: transform .15s;
}
.link-btn:active .link-icon { transform:scale(.85); }
.link-label{ flex:1; text-align: left; }
.link-meta{ font-size:10px; color:rgba(255,255,255,.35); margin-top:1px; }
.link-arrow{ font-size:11px; color:rgba(255,255,255,.25); transition:.2s; flex-shrink:0; }
.link-btn:hover .link-arrow, .link-btn:active .link-arrow{ color:rgba(255,255,255,.6); transform:translateX(3px); }

/* خط نيون من تحت */
.link-btn::after {
  content: ""; position: absolute; bottom: 0; left: 10%; width: 80%; height: 2px; opacity: 0.4; transition: 0.3s;
}

/* shine sweep */
.link-btn::before{
  content:""; position:absolute;
  top:0; left:-100%; width:55%; height:100%;
  background:linear-gradient(120deg,transparent,rgba(255,255,255,.05),transparent);
  transform:skewX(-20deg); transition:.5s;
}
.link-btn:hover::before, .link-btn:active::before{ left:160%; }
.link-btn:active{ transform:scale(.98) !important; }

/* المنصات والـ Glow */
.tt .link-icon{ background:rgba(37,244,238,.1); color:#25F4EE; }
.tt::after { background: #25F4EE; box-shadow: 0 0 8px #25F4EE; }
.tt:hover, .tt:active { background:rgba(37,244,238,.06); border-color:#25F4EE; box-shadow: 0 0 15px rgba(37,244,238,0.35); transform:translateY(-1.5px); }
.tt:hover::after, .tt:active::after { opacity: 1; width: 100%; left: 0; }

.wa .link-icon{ background:rgba(37,211,102,.1); color:#25D366; }
.wa::after { background: #25D366; box-shadow: 0 0 8px #25D366; }
.wa:hover, .wa:active { background:rgba(37,211,102,.06); border-color:#25D366; box-shadow: 0 0 15px rgba(37,211,102,0.35); transform:translateY(-1.5px); }
.wa:hover::after, .wa:active::after { opacity: 1; width: 100%; left: 0; }

.kk .link-icon{ background:rgba(83,252,31,.1); }
.kk .link-icon img{ width:18px; height:18px; border-radius:5px; }
.kk::after { background: #53fc1f; box-shadow: 0 0 8px #53fc1f; }
.kk:hover, .kk:active { background:rgba(83,252,31,.06); border-color:#53fc1f; box-shadow: 0 0 15px rgba(83,252,31,0.35); transform:translateY(-1.5px); }
.kk:hover::after, .kk:active::after { opacity: 1; width: 100%; left: 0; }

.dc .link-icon{ background:rgba(114,137,218,.1); color:#7289DA; }
.dc::after { background: #7289DA; box-shadow: 0 0 8px #7289DA; }
.dc:hover, .dc:active { background:rgba(114,137,218,.06); border-color:#7289DA; box-shadow: 0 0 15px rgba(114,137,218,0.35); transform:translateY(-1.5px); }
.dc:hover::after, .dc:active::after { opacity: 1; width: 100%; left: 0; }

.dn .link-icon{ background:rgba(255,215,0,.1); color:#FFD700; }
.dn::after { background: #FFD700; box-shadow: 0 0 8px #FFD700; }
.dn:hover, .dn:active { background:rgba(255,215,0,.06); border-color:#FFD700; box-shadow: 0 0 15px rgba(255,215,0,0.35); transform:translateY(-1.5px); }
.dn:hover::after, .dn:active::after { opacity: 1; width: 100%; left: 0; }

/* Ultra Smooth Drop-in animation */
@keyframes dropIn{
  0% { opacity:0; transform:translateY(15px); }
  100%{ opacity:1; transform:translateY(0); }
}
#page-links.active .back-btn { animation: fadeUp .3s ease both; }
#page-links.active .mini-av { animation: fadeUp .3s ease .04s both; }
#page-links.active .section-lbl{ animation: fadeUp .3s ease .08s both; }
#page-links.active .link-btn:nth-of-type(1){ animation:dropIn .3s cubic-bezier(.25,1,.5,1) .1s both; }
#page-links.active .link-btn:nth-of-type(2){ animation:dropIn .3s cubic-bezier(.25,1,.5,1) .13s both; }
#page-links.active .link-btn:nth-of-type(3){ animation:dropIn .3s cubic-bezier(.25,1,.5,1) .16s both; }
#page-links.active .link-btn:nth-of-type(4){ animation:dropIn .3s cubic-bezier(.25,1,.5,1) .19s both; }
#page-links.active .link-btn:nth-of-type(5){ animation:dropIn .3s cubic-bezier(.25,1,.5,1) .22s both; }

/* ripple */
.ripple{
  position:absolute; border-radius:50%;
  background:rgba(255,255,255,.1);
  transform:scale(0);
  animation:rip .4s ease-out forwards;
  pointer-events:none;
}
@keyframes rip{ to{ transform:scale(4); opacity:0; } }

/* footer */
.footer{
  position:relative; z-index:2;
  text-align:center;
  padding: 12px 0;
  font-size:10px; color:rgba(255,255,255,.12);
  letter-spacing:1px;
}
</style>

<script>
/* ══════════════════════════
   NATIVE PHYSICAL CLICK ENGINE (توليد كليك فيزيائي حقيقي غير قابل للحظر)
══════════════════════════ */
var audioCtx = null;

// دالة لتصنيع صوت "تكة" ميكانيكية حقيقية فوراً
function playMechanicalClick() {
  try {
    // تفعيل الـ AudioContext فوراً وتجنب قيود المتصفحات الذكية
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') {
      audioCtx.resume();
    }

    var now = audioCtx.currentTime;

    // 1. صناعة موجة الـ Noise (الاحتكاك الفيزيائي السريع للزرار الميكانيكي)
    var bufferSize = audioCtx.sampleRate * 0.02; // مدة قصيرة جداً (20 ملي ثانية)
    var buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    var data = buffer.getChannelData(0);
    for (var i = 0; i < bufferSize; i++) {
      data[i] = Math.random() * 2 - 1;
    }
    var noise = audioCtx.createBufferSource();
    noise.buffer = buffer;

    // فلتر لتنعيم الصوت وجعله "مكتوم وواقعي" زي البلاستيك أو المعدن الحقيقي
    var filter = audioCtx.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.setValueAtTime(1000, now);

    var noiseGain = audioCtx.createGain();
    noiseGain.gain.setValueAtTime(0.3, now);
    noiseGain.gain.exponentialRampToValueAtTime(0.001, now + 0.015);

    noise.connect(filter);
    filter.connect(noiseGain);
    noiseGain.connect(audioCtx.destination);

    // 2. صناعة موجة الـ Snap (نقرة الزرار الحادة النظيفة)
    var osc = audioCtx.createOscillator();
    var oscGain = audioCtx.createGain();

    osc.type = 'triangle'; 
    osc.frequency.setValueAtTime(800, now); // تردد نقرة فيزيائية
    osc.frequency.exponentialRampToValueAtTime(100, now + 0.02);

    oscGain.gain.setValueAtTime(0.5, now); // صوت قوي ومسموع
    oscGain.gain.exponentialRampToValueAtTime(0.001, now + 0.02);

    osc.connect(oscGain);
    oscGain.connect(audioCtx.destination);

    // تشغيل الاتنين مع بعض في نفس الفمتو ثانية للحصول على صوت حقيقي بالكامل
    noise.start(now);
    osc.start(now);
    
    noise.stop(now + 0.02);
    osc.stop(now + 0.02);

  } catch (e) {
    console.error("Audio Engine Error: ", e);
  }
}

/* ══════════════════════════
   PARTICLES
══════════════════════════ */
(function(){
  var cv=document.getElementById('particles');
  var ctx=cv.getContext('2d');
  var W,H,pts=[];
  function resize(){ W=cv.width=innerWidth; H=cv.height=innerHeight; }
  resize(); window.addEventListener('resize',resize);

  for(var i=0; i<45; i++) pts.push({
    x:Math.random()*W, y:Math.random()*H,
    vx:(Math.random()-.5)*.3,
    vy:(Math.random()-.5)*.3,
    r:Math.random()*1.2+.3,
    pulse:Math.random()*Math.PI*2
  });

  function draw(){
    ctx.clearRect(0,0,W,H);
    var t=Date.now()*.001;
    pts.forEach(function(p){
      p.x+=p.vx; p.y+=p.vy;
      if(p.x<-10)p.x=W+10; if(p.x>W+10)p.x=-10;
      if(p.y<-10)p.y=H+10; if(p.y>H+10)p.y=-10;
      var alpha=.06+0.05*Math.sin(t*1.2+p.pulse);
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle='rgba(52,211,153,'+alpha+')';
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

/* ══════════════════════════
   PAGE TRANSITIONS
══════════════════════════ */
function goProfile(){
  var prof=document.getElementById('page-profile');
  var links=document.getElementById('page-links');

  links.style.transition='opacity .2s ease, transform .2s ease';
  links.style.opacity='0';
  links.style.transform='translateY(10px)';
  
  setTimeout(function(){
    links.style.display='none';
    links.classList.remove('active');
    
    prof.style.display='flex';
    requestAnimationFrame(function(){
      prof.style.transition='opacity .2s ease, transform .2s ease';
      prof.style.opacity='1';
      prof.style.transform='translateY(0)';
    });
  }, 200);
}

function goLinks(){
  var prof=document.getElementById('page-profile');
  var links=document.getElementById('page-links');

  prof.style.transition='opacity .2s ease, transform .2s ease';
  prof.style.opacity='0';
  prof.style.transform='translateY(-10px)';

  setTimeout(function(){
    prof.style.display='none';

    links.style.opacity='0';
    links.style.transform='translateY(10px)';
    links.style.display='flex';
    links.classList.add('active');

    requestAnimationFrame(function(){
      links.style.transition='opacity .2s ease, transform .2s ease';
      links.style.opacity='1';
      links.style.transform='translateY(0)';
    });
  }, 200);
}

/* ══════════════════════════
   RIPPLE EFFECT
══════════════════════════ */
document.addEventListener('pointerdown',function(e){
  var btn=e.target.closest('.link-btn, .enter-btn');
  if(!btn) return;
  var r=document.createElement('span');
  r.className='ripple';
  var rect=btn.getBoundingClientRect();
  var size=Math.max(rect.width,rect.height);
  r.style.cssText='width:'+size+'px;height:'+size+'px;left:'+(e.clientX-rect.left-size/2)+'px;top:'+(e.clientY-rect.top-size/2)+'px;';
  btn.appendChild(r);
  setTimeout(function(){ r.remove(); },400);
});
</script>
