<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    min-height:100vh;
    background: url("https://i.ibb.co/8DznhvfR/photo.jpg") center center / cover no-repeat fixed;
    position:relative;
    overflow-x:hidden;
}

body::after{
    content:"";
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.6);
    z-index:0;
}

.top-section{
    position:relative;
    text-align:center;
    padding: 8vh 20px 5vh;
    z-index:2;
}

.profile-img{
    width: min(75vw, 280px);
    height: min(75vw, 280px);
    border-radius:50%;
    object-fit:cover;
    border: 4px solid #34D399;
    box-shadow: 0 0 0 0 rgba(52,211,153,.6);
    margin-bottom: 5vh;
    animation: popIn .8s cubic-bezier(.34,1.56,.64,1) forwards, pulse 2.5s ease-in-out 1s infinite;
    opacity:0;
    transform:scale(.5);
}

@keyframes popIn{
    to{ opacity:1; transform:scale(1); }
}

@keyframes pulse{
    0%,100%{ box-shadow: 0 0 0 0 rgba(52,211,153,.5); }
    50%{ box-shadow: 0 0 0 14px rgba(52,211,153,0); }
}

.btn{
    padding: 4vw 12vw;
    border-radius:50px;
    color:#fff;
    font-size: clamp(18px, 5vw, 22px);
    font-weight:700;
    cursor:pointer;
    background:rgba(255,255,255,.1);
    border: 1.5px solid rgba(255,255,255,.3);
    transition:.3s;
    letter-spacing: 2px;
    animation: fadeUp .8s ease .5s forwards;
    opacity:0;
    transform:translateY(30px);
}

@keyframes fadeUp{
    to{ opacity:1; transform:translateY(0); }
}

.btn:active{
    transform:scale(.95);
}

.container{
    text-align:center;
    padding: 0 20px 60px;
    position:relative;
    z-index:2;
}

#links{ display:none; }

.link-btn{
    display:flex;
    align-items:center;
    justify-content:center;
    gap: 14px;
    width: min(88vw, 380px);
    margin: 16px auto;
    padding: clamp(16px, 4.5vw, 20px) 20px;
    border-radius: 20px;
    text-decoration:none;
    color:white;
    font-size: clamp(17px, 4.5vw, 20px);
    font-weight:700;
    background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.18);
    opacity:0;
    transform:translateY(60px) scale(.85);
    filter:blur(4px);
    position:relative;
    overflow:hidden;
    letter-spacing:1px;
    transition: transform .25s ease, box-shadow .25s ease;
}

.link-btn i, .link-btn img{
    font-size: clamp(22px, 5.5vw, 26px);
    flex-shrink:0;
}

.link-btn img{
    width: clamp(22px, 5.5vw, 26px);
    height: clamp(22px, 5.5vw, 26px);
}

/* shiny sweep */
.link-btn::before{
    content:"";
    position:absolute;
    top:0; left:-100%;
    width:60%;
    height:100%;
    background:linear-gradient(120deg,transparent,rgba(255,255,255,.2),transparent);
    transition:.7s;
}
.link-btn:hover::before, .link-btn:active::before{ left:160%; }

.link-btn:active{
    transform:scale(.97) !important;
}

@keyframes dropIn{
    0%{ opacity:0; transform:translateY(80px) scale(.8); filter:blur(8px); }
    65%{ opacity:1; transform:translateY(-8px) scale(1.03); filter:blur(0); }
    100%{ opacity:1; transform:translateY(0) scale(1); filter:blur(0); }
}

#links.show .link-btn:nth-child(1){ animation:dropIn .65s cubic-bezier(.34,1.4,.64,1) .05s forwards; }
#links.show .link-btn:nth-child(2){ animation:dropIn .65s cubic-bezier(.34,1.4,.64,1) .18s forwards; }
#links.show .link-btn:nth-child(3){ animation:dropIn .65s cubic-bezier(.34,1.4,.64,1) .31s forwards; }
#links.show .link-btn:nth-child(4){ animation:dropIn .65s cubic-bezier(.34,1.4,.64,1) .44s forwards; }

/* hover glow — desktop فقط */
@media(hover:hover){
    .link-btn:hover{
        transform:translateY(-6px) scale(1.04);
    }
    .tiktok:hover{ box-shadow:0 8px 28px rgba(37,244,238,.35); }
    .whatsapp:hover{ box-shadow:0 8px 28px rgba(37,211,102,.35); }
    .kick:hover{ box-shadow:0 8px 28px rgba(83,252,31,.35); }
    .donate:hover{ box-shadow:0 8px 28px rgba(255,215,0,.35); }
}

.tiktok i{ color:#25F4EE; }
.whatsapp i{ color:#25D366; }
.donate i{ color:#FFD700; }
</style>
</head>
<body>

<div class="top-section">
    <img class="profile-img"
        src="https://i.ibb.co/1Gtzwvph/7df55b7a-c234-4a6d-a25c-8dcdb39e067e-fullsize.webp"
        alt="profile">

    <div id="home">
        <button class="btn" onclick="showLinks()">𝑰𝒏𝒕𝒆𝒓</button>
    </div>
</div>

<div class="container">
    <div id="links">

        <a class="link-btn tiktok" href="https://tiktok.com/@s_adham_solo_s" target="_blank">
            <i class="fab fa-tiktok"></i>
            <span>TIKTOK</span>
        </a>

        <a class="link-btn whatsapp" href="https://whatsapp.com/channel/0029Vb7axUEDzgT4EbFP4r12" target="_blank">
            <i class="fab fa-whatsapp"></i>
            <span>WHATSAPP</span>
        </a>

        <a class="link-btn kick" href="https://kick.com/solo_39" target="_blank">
            <img src="https://play-lh.googleusercontent.com/zEMwKW77990UYUC6aJrJhJmnKdHpr_56Y4W1n7C9xrk2a2gSTT62_Lk1uaLek-cYH4UBl12pc8Au4444oYQK=w240-h480-rw" alt="kick">
            <span>KICK</span>
        </a>

        <a class="link-btn donate" href="https://ipn.eg/S/adhamsolo90/instapay/50rIUM">
            <i class="fas fa-hand-holding-dollar"></i>
            <span>DONATE</span>
        </a>

    </div>
</div>

<script>
function showLinks(){
    document.getElementById("home").style.display="none";
    const links = document.getElementById("links");
    links.style.display="block";
    setTimeout(()=>{ links.classList.add("show"); }, 30);
}
</script>

</body>
</html>
