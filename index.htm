<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Solo</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
*{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

:root{
  --g: #34D399;
  --g2: #10B981;
  --g3: #6EE7B7;
  --dark: #050e09;
}

html,body{ height:100%; overflow-x:hidden; background:#050e09; }

body{
  min-height:100vh;
  font-family:'Segoe UI',Arial,sans-serif;
  position:relative;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

/* BG image with dark overlay */
.bg{
  position:fixed; inset:0; z-index:0;
  background: url("https://i.ibb.co/8DznhvfR/photo.jpg") center/cover no-repeat;
}
.bg::after{
  content:""; position:absolute; inset:0;
  background: linear-gradient(180deg,
    rgba(5,14,9,.88) 0%,
    rgba(5,14,9,.75) 40%,
    rgba(5,14,9,.92) 100%
  );
}

/* floating particles canvas */
#particles{ position:fixed; inset:0; z-index:1; pointer-events:none; }

/* aurora glow blobs */
.aurora{
  position:fixed; z-index:1; pointer-events:none;
  border-radius:50%; filter:blur(80px); opacity:.18;
}
.aurora-1{
  width:300px; height:300px;
  background: radial-gradient(circle, #34D399, transparent 70%);
  top:-50px; left:-50px;
  animation: float1 8s ease-in-out infinite;
}
.aurora-2{
  width:250px; height:250px;
  background: radial-gradient(circle, #059669, transparent 70%);
  bottom:-50px; right:-50px;
  animation: float2 10s ease-in-out infinite;
}
@keyframes float1{
  0%,100%{ transform:translate(0,0); }
  50%{ transform:translate(40px,20px); }
}
@keyframes float2{
  0%,100%{ transform:translate(0,0); }
  50%{ transform:translate(-30px,-20px); }
}

/* ═══════════════════════════════
   PAGE: PROFILE
═══════════════════════════════ */
#page-profile{
  position:relative; z-index:2;
  display:flex;
  flex-direction:column; align-items:center;
  padding: 6vh 20px 30px;
  width: 100%;
  max-width: 480px;
  margin: 0 auto;
  opacity:0;
  transform:translateY(15px);
  animation: initProfile 0.5s cubic-bezier(.25, 1, .5, 1) forwards;
}

@keyframes initProfile {
  to { opacity:1; transform:translateY(0); }
}

/* avatar */
.av-wrap{
  position:relative;
  width:min(55vw,180px);
  height:min(55vw,180px);
  margin-bottom:24px;
}

/* outer orbit ring */
.orbit{
  position:absolute; inset:-18px;
  border-radius:50%;
  animation: spin 6s linear infinite;
}
.orbit-dot{
  position:absolute; top:2px; left:50%; transform:translateX(-50%);
  width:6px; height:6px; border-radius:50%;
  background: var(--g);
  box-shadow: 0 0 10px var(--g), 0 0 20px var(--g);
}
.orbit-dot2{
  position:absolute; bottom:2px; left:50%; transform:translateX(-50%);
  width:4px; height:4px; border-radius:50%;
  background: var(--g3); opacity:.6;
}
.orbit-ring{
  position:absolute; inset:0;
  border-radius:50%;
  border:1px solid rgba(52,211,153,.15);
}

@keyframes spin{ to{ transform:rotate(360deg); } }

/* spinning arc */
.arc{
  position:absolute; inset:-10px;
  border-radius:50%;
  border:2px solid transparent;
  border-top-color: var(--g);
  border-right-color: rgba(52,211,153,.3);
  animation: spin 2.5s linear infinite;
}
.arc2{
  position:absolute; inset:-14px;
  border-radius:50%;
  border:1px solid transparent;
  border-bottom-color: var(--g2);
  border-left-color: rgba(16,185,129,.2);
  animation: spin 4s linear infinite reverse;
}

.av-img{
  width:100%; height:100%;
  border-radius:50%;
  object-fit:cover;
  border:3px solid rgba(52,211,153,.3);
  position:relative; z-index:1;
  animation: popIn .6s cubic-bezier(.34,1.56,.64,1) .1s both;
  opacity:0; transform:scale(.3);
}
@keyframes popIn{ to{ opacity:1; transform:scale(1); } }

/* live pulse ring */
.live-ring{
  position:absolute; inset:0; border-radius:50%; z-index:0;
  animation: liveRing 2s ease-in-out infinite;
}
@keyframes liveRing{
  0%,100%{ box-shadow:0 0 0 0 rgba(52,211,153,.4); }
  50%{ box-shadow:0 0 0 12px rgba(52,211,153,0); }
}

/* LIVE badge */
.live-badge{
  position:absolute; bottom:-2px; left:50%; transform:translateX(-50%);
  display:flex; align-items:center; gap:5px;
  background:#ef4444; color:#fff;
  font-size:9px; font-weight:800; letter-spacing:1.5px;
  padding:3px 10px; border-radius:20px; z-index:2;
  box-shadow:0 0 12px rgba(239,68,68,.4);
  animation: fadeUp .5s ease .3s both;
}
.live-dot{ width:6px; height:6px; border-radius:50%; background:#fff; animation:blink 1s ease-in-out infinite; }
@keyframes blink{ 0%,100%{opacity:1} 50%{opacity:.15} }

/* name */
.profile-name{
  font-size:clamp(28px,8vw,38px);
  font-weight:900; color:#fff;
  letter-spacing:4px; text-transform:uppercase;
  text-shadow:0 0 40px rgba(52,211,153,.35);
  animation: fadeUp .5s ease .15s both;
  opacity:0;
}
.profile-tag{
  font-size:clamp(11px,2.8vw,13px);
  color:var(--g); letter-spacing:3px;
  text-transform:uppercase; margin-top:6px;
  animation: fadeUp .5s ease .25s both;
  opacity:0;
  text-align: center;
}

/* divider */
.divider{
  display:flex; align-items:center; gap:12px;
  margin:16px 0;
  width: 100%;
  justify-content: center;
  animation: fadeUp .5s ease .35s both;
  opacity:0;
}
.divider-line{ width:50px; height:1px; background:rgba(52,211,153,.25); }
.divider-icon{ color:var(--g); font-size:12px; }

/* stats */
.stats{
  display:flex; width:100%;
  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.06);
  border-radius:14px; overflow:hidden;
  animation: fadeUp .5s ease .4s both;
  opacity:0;
}
.stat{
  padding:12px 10px; text-align:center; flex:1;
}
.stat+.stat{ border-left:1px solid rgba(255,255,255,.06); }
.stat-n{ font-size:14px; font-weight:700; color:#fff; }
.stat-l{ font-size:9px; color:rgba(255,255,255,.4); letter-spacing:1px; text-transform:uppercase; margin-top:2px; }

/* enter btn */
.enter-btn{
  margin-top:24px;
  padding:14px 44px;
  border-radius:50px;
  border:1.5px solid rgba(52,211,153,.35);
  background:rgba(52,211,153,.07);
  color:#fff;
  font-size:clamp(14px,4vw,16px);
  font-weight:700; letter-spacing:3px;
  cursor:pointer; overflow:hidden; position:relative;
  animation: fadeUp .5s ease .5s both;
  opacity:0;
  transition:.2s cubic-bezier(.25, 1, .5, 1);
}
.enter-btn::after{
  content:"";
  position:absolute; inset:0;
  background: radial-gradient(ellipse at 50% 110%, rgba(52,211,153,.25), transparent 70%);
  opacity:0; transition:.3s;
}
.enter-btn:hover::after,.enter-btn:active::after{ opacity:1; }
.enter-btn:active{ transform:scale(.95); }

@keyframes fadeUp{
  from{ opacity:0; transform:translateY(15px); }
  to{ opacity:1; transform:translateY(0); }
}


/* ═══════════════════════════════
   PAGE: LINKS
═══════════════════════════════ */
#page-links{
  position:relative; z-index:2;
  display:none; flex-direction:column; align-items:center;
  padding:4vh 16px 40px;
  width: 100%;
  max-width: 430px;
  margin: 0 auto;
}

/* back button */
.back-btn{
  align-self:flex-start;
  display:flex; align-items:center; gap:6px;
  color:rgba(255,255,255,.5);
  font-size:13px; letter-spacing:1px;
  background:none; border:none; cursor:pointer;
  padding:6px 0; margin-bottom:12px;
  transition:.2s;
}
.back-btn:hover{ color:var(--g); }
.back-btn i{ font-size:14px; }

/* mini avatar (تكبير وتنسيق الصورة) */
.mini-av{
  display:flex; flex-direction:column; align-items:center;
  margin-bottom:20px;
}
.mini-av img{
  width:min(28vw, 110px); /* اتكبرت وبقت متناسقة جداً على الفون */
  height:min(28vw, 110px);
  border-radius:50%;
  object-fit:cover;
  border:3px solid rgba(52,211,153,.4);
  box-shadow:0 0 20px rgba(52,211,153,.25);
}
.mini-av-name{
  font-size:17px; font-weight:700; color:#fff;
  letter-spacing:2px; margin-top:10px;
}
.mini-av-tag{
  font-size:11px; color:var(--g);
  letter-spacing:2px; margin-top:3px;
}

/* section label */
.section-lbl{
  font-size:9px; letter-spacing:3px;
  color:rgba(255,255,255,.25);
  text-transform:uppercase;
  margin-bottom:14px;
}

/* link buttons */
.link-btn{
  display:flex; align-items:center;
  width:100%;
  margin:6px 0;
  padding:13px 16px;
  border-radius:16px;
  text-decoration:none; color:#fff;
  font-size:15px;
  font-weight:700;
  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.06);
  position:relative; overflow:hidden;
  opacity:0;
  transition: background .2s, border-color .2s, transform .2s;
  cursor:pointer;
}
.link-icon{
  width:36px; height:36px; border-radius:12px;
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0; margin-right:12px; font-size:16px;
  transition: transform .2s;
}
.link-btn:active .link-icon{ transform:scale(.85); }
.link-label{ flex:1; }
.link-meta{ font-size:10px; color:rgba(255,255,255,.35); margin-top:1px; }
.link-arrow{ font-size:11px; color:rgba(255,255,255,.25); transition:.2s; flex-shrink:0; }
.link-btn:hover .link-arrow,.link-btn:active .link-arrow{ color:rgba(255,255,255,.6); transform:translateX(3px); }

/* shine sweep */
.link-btn::before{
  content:""; position:absolute;
  top:0; left:-100%; width:55%; height:100%;
  background:linear-gradient(120deg,transparent,rgba(255,255,255,.06),transparent);
  transform:skewX(-20deg); transition:.6s;
}
.link-btn:hover::before,.link-btn:active::before{ left:160%; }
.link-btn:active{ transform:scale(.98) !important; }

/* platform theming */
.tt  .link-icon{ background:rgba(37,244,238,.1); color:#25F4EE; }
.wa  .link-icon{ background:rgba(37,211,102,.1); color:#25D366; }
.kk  .link-icon{ background:rgba(83,252,31,.1); }
.kk  .link-icon img{ width:18px; height:18px; border-radius:5px; }
.dc  .link-icon{ background:rgba(114,137,218,.1); color:#7289DA; }
.dn  .link-icon{ background:rgba(255,215,0,.1); color:#FFD700; }

.tt { border-color:rgba(37,244,238,.1); }
.wa { border-color:rgba(37,211,102,.1); }
.kk { border-color:rgba(83,252,31,.1); }
.dc { border-color:rgba(114,137,218,.1); }
.dn { border-color:rgba(255,215,0,.1); }

@media(hover:hover){
  .tt:hover { background:rgba(37,244,238,.05); border-color:rgba(37,244,238,.3); transform:translateY(-2px); }
  .wa:hover { background:rgba(37,211,102,.05); border-color:rgba(37,211,102,.3); transform:translateY(-2px); }
  .kk:hover { background:rgba(83,252,31,.05);  border-color:rgba(83,252,31,.3);  transform:translateY(-2px); }
  .dc:hover { background:rgba(114,137,218,.05);border-color:rgba(114,137,218,.3);transform:translateY(-2px); }
  .dn:hover { background:rgba(255,215,0,.05);  border-color:rgba(255,215,0,.3);  transform:translateY(-2px); }
}

/* Smooth Drop-in animation for links */
@keyframes dropIn{
  0%  { opacity:0; transform:translateY(20px); filter:blur(2px); }
  100%{ opacity:1; transform:translateY(0); filter:blur(0); }
}
#page-links.active .back-btn { animation: fadeUp .35s ease both; }
#page-links.active .mini-av  { animation: fadeUp .35s ease .05s both; }
#page-links.active .section-lbl{ animation: fadeUp .35s ease .1s both; }
#page-links.active .link-btn:nth-of-type(1){ animation:dropIn .35s cubic-bezier(.25,1,.5,1) .12s both; }
#page-links.active .link-btn:nth-of-type(2){ animation:dropIn .35s cubic-bezier(.25,1,.5,1) .16s both; }
#page-links.active .link-btn:nth-of-type(3){ animation:dropIn .35s cubic-bezier(.25,1,.5,1) .20s both; }
#page-links.active .link-btn:nth-of-type(4){ animation:dropIn .35s cubic-bezier(.25,1,.5,1) .24s both; }
#page-links.active .link-btn:nth-of-type(5){ animation:dropIn .35s cubic-bezier(.25,1,.5,1) .28s both; }

/* ripple */
.ripple{
  position:absolute; border-radius:50%;
  background:rgba(255,255,255,.12);
  transform:scale(0);
  animation:rip .45s ease-out forwards;
  pointer-events:none;
}
@keyframes rip{ to{ transform:scale(4); opacity:0; } }

/* footer */
.footer{
  position:relative; z-index:2;
  text-align:center;
  padding: 15px 0;
  font-size:11px; color:rgba(255,255,255,.15);
  letter-spacing:1px;
}
</style>

<script>
/* ══════════════════════════
   PARTICLES
══════════════════════════ */
(function(){
  var cv=document.getElementById('particles');
  var ctx=cv.getContext('2d');
  var W,H,pts=[];
  function resize(){ W=cv.width=innerWidth; H=cv.height=innerHeight; }
  resize(); window.addEventListener('resize',resize);

  for(var i=0; i<45; i++) pts.push({
    x:Math.random()*W, y:Math.random()*H,
    vx:(Math.random()-.5)*.3,
    vy:(Math.random()-.5)*.3,
    r:Math.random()*1.2+.3,
    pulse:Math.random()*Math.PI*2
  });

  function draw(){
    ctx.clearRect(0,0,W,H);
    var t=Date.now()*.001;
    pts.forEach(function(p){
      p.x+=p.vx; p.y+=p.vy;
      if(p.x<-10)p.x=W+10; if(p.x>W+10)p.x=-10;
      if(p.y<-10)p.y=H+10; if(p.y>H+10)p.y=-10;
      var alpha=.06+0.05*Math.sin(t*1.2+p.pulse);
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle='rgba(52,211,153,'+alpha+')';
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

/* ══════════════════════════
   PAGE TRANSITIONS
══════════════════════════ */
function goProfile(){
  var prof=document.getElementById('page-profile');
  var links=document.getElementById('page-links');

  links.style.transition='opacity .22s ease, transform .22s ease';
  links.style.opacity='0';
  links.style.transform='translateY(15px)';
  
  setTimeout(function(){
    links.style.display='none';
    links.classList.remove('active');
    
    prof.style.display='flex';
    requestAnimationFrame(function(){
      prof.style.transition='opacity .25s ease, transform .25s ease';
      prof.style.opacity='1';
      prof.style.transform='translateY(0)';
    });
  }, 220);
}

function goLinks(){
  var prof=document.getElementById('page-profile');
  var links=document.getElementById('page-links');

  prof.style.transition='opacity .22s ease, transform .22s ease';
  prof.style.opacity='0';
  prof.style.transform='translateY(-15px)';

  setTimeout(function(){
    prof.style.display='none';

    links.style.opacity='0';
    links.style.transform='translateY(15px)';
    links.style.display='flex';
    links.classList.add('active');

    requestAnimationFrame(function(){
      links.style.transition='opacity .25s ease, transform .25s ease';
      links.style.opacity='1';
      links.style.transform='translateY(0)';
    });
  }, 220);
}

/* ══════════════════════════
   RIPPLE EFFECT
══════════════════════════ */
document.addEventListener('pointerdown',function(e){
  var btn=e.target.closest('.link-btn, .enter-btn');
  if(!btn) return;
  var r=document.createElement('span');
  r.className='ripple';
  var rect=btn.getBoundingClientRect();
  var size=Math.max(rect.width,rect.height);
  r.style.cssText='width:'+size+'px;height:'+size+'px;left:'+(e.clientX-rect.left-size/2)+'px;top:'+(e.clientY-rect.top-size/2)+'px;';
  btn.appendChild(r);
  setTimeout(function(){ r.remove(); },450);
});
</script>
